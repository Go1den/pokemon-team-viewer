<html>
    <head>
        <link rel="stylesheet" href="css/main.css">
        <script src="js/main.js" type="text/javascript"></script>
    </head>
    <body>
        <div>Enter a Pokemon's Pokedex number and its image will appear below.<br>
        You can view your Pokedex numbers from the Check Summary screen in Pokemon Champions.</div>
        <br>
        Background Color: <input type="color" id="color1" onchange="setBG()">&nbsp;
        Orientation: <select id="orientation" onchange="setOrientation()">
            <option value="1x6">1x6</option>
            <option value="2x3">2x3</option>
            <option value="3x2">3x2</option>
            <option value="6x1" selected>6x1</option>
        </select>&nbsp;
        Image Size (Pixels): <input type="number" id="imageSize" onchange="refreshAll()" value="150">
        <br>
        <br>
        <table id="setupTable">
            <tr>
                <td class="text">
                    Pokemon #1
                </td>
                <td class="text">
                    Pokemon #2
                </td>
                <td class="text">
                    Pokemon #3
                </td>
                <td class="text">
                    Pokemon #4
                </td>
                <td class="text">
                    Pokemon #5
                </td>
                <td class="text">
                    Pokemon #6
                </td>
            </tr>
            <tr>
                <td class="input">
                    <input type="number" id="input1" onchange="refresh(1)" value="0">
                </td>
                <td class="input">
                    <input type="number" id="input2" onchange="refresh(2)" value="0">
                </td>
                <td class="input">
                    <input type="number" id="input3" onchange="refresh(3)" value="0">
                </td>
                <td class="input">
                    <input type="number" id="input4" onchange="refresh(4)" value="0">
                </td>
                <td class="input">
                    <input type="number" id="input5" onchange="refresh(5)" value="0">
                </td>
                <td class="input">
                    <input type="number" id="input6" onchange="refresh(6)" value="0">
                </td>
            </tr>
            <tr>
                <td class="button">
                    <button id="flip1" onclick="flip(1)">Flip</button>
                </td>
                <td class="button">
                    <button id="flip2" onclick="flip(2)">Flip</button>
                </td>
                <td class="button">
                    <button id="flip3" onclick="flip(3)">Flip</button>
                </td>
                <td class="button">
                    <button id="flip4" onclick="flip(4)">Flip</button>
                </td>
                <td class="button">
                    <button id="flip5" onclick="flip(5)">Flip</button>
                </td>
                <td class="button">
                    <button id="flip6" onclick="flip(6)">Flip</button>
                </td>
            </tr>
        </table>
        <br>
        <br>
        <table id="displayTable">
            <tbody>
                <tr>
                    <td id="pokemon1"></td>
                    <td id="pokemon2"></td>
                    <td id="pokemon3"></td>
                    <td id="pokemon4"></td>
                    <td id="pokemon5"></td>
                    <td id="pokemon6"></td>
                </tr>
            </tbody>
        </table>
    </body>
</html>
